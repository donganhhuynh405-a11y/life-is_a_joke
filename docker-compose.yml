services:
  redis:
    image: redis:alpine
    # No host port binding: the bot connects via the internal Docker network
    # (redis://redis:6379/0), so exposing 6379 on the host is unnecessary and
    # causes "address already in use" errors if another Redis is already running.
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  
  bot:
    build: .
    container_name: trading-bot
    depends_on:
      - postgres
      - redis
    volumes:
      - bot_data:/var/lib/trading-bot
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://trader:${DB_PASSWORD}@postgres:5432/trading
      # Safe default: disable live trading until the user configures real API keys
      # in their .env file.  Override with TRADING_ENABLED=true once configured.
      - TRADING_ENABLED=${TRADING_ENABLED:-false}
      # Exchange API credentials — empty by default; set in .env to enable trading
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY:-}
      - EXCHANGE_API_SECRET=${EXCHANGE_API_SECRET:-}
      # Telegram notifications — optional
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Environment tag
      - ENVIRONMENT=${ENVIRONMENT:-development}
    # env_file is intentionally omitted: Docker Compose v1 raises an error when
    # the file does not exist, which would prevent the container from starting on
    # a fresh deployment.  All required variables are forwarded above via the
    # explicit environment: block, which uses ${VAR:-default} syntax so missing
    # variables never cause a fatal error.
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
  
  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes: [grafana_data:/var/lib/grafana]

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  bot_data:
